name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and smoke-run lab
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run symbolic chemistry smoke test
        run: silive evaluate-chain "Si-O-Si-O-Fe-O-Si"

      - name: Run RDKit command smoke test without optional dependency
        run: |
          if silive rdkit-evaluate "[Si]O[Si]O[Fe]O[Si]"; then
            echo "RDKit layer available"
          else
            echo "RDKit layer unavailable as expected in base CI"
          fi

      - name: Run proto-gene command smoke test without optional dependency
        run: |
          if silive rdkit-gene-evaluate "[Si]O[Si]O[Fe]O[Si]"; then
            echo "Proto-gene layer available"
          else
            echo "Proto-gene layer unavailable as expected in base CI"
          fi

      - name: Run proto-genome command smoke test without optional dependency
        run: |
          if silive rdkit-genome-evaluate "[Si]O[Si]O[Fe]O[Si]"; then
            echo "Proto-genome layer available"
          else
            echo "Proto-genome layer unavailable as expected in base CI"
          fi

      - name: Run symbolic graph command smoke test without optional dependency
        run: |
          if silive rdkit-graph-evaluate "[Si]O[Si]O[Fe]OP(=O)(O)O[Si]"; then
            echo "Symbolic graph layer available"
          else
            echo "Symbolic graph layer unavailable as expected in base CI"
          fi

      - name: Run RDKit search smoke test without optional dependency
        run: |
          if silive rdkit-search examples/rdkit_candidates.smi --output outputs/rdkit_search.csv --top 5; then
            echo "RDKit search available"
          else
            echo "RDKit search unavailable as expected in base CI"
          fi

      - name: Run reaction simulate smoke test without optional dependency
        run: |
          if silive rdkit-reaction-simulate "[Si]O[Si]O[Fe]O[Si]" --top 3; then
            echo "Reaction simulator available"
          else
            echo "Reaction simulator unavailable as expected in base CI"
          fi

      - name: Run reaction search smoke test without optional dependency
        run: |
          if silive rdkit-reaction-search examples/rdkit_candidates.smi --output outputs/reaction_search.csv --top 5; then
            echo "Reaction search available"
          else
            echo "Reaction search unavailable as expected in base CI"
          fi

      - name: Run environment chemistry smoke test
        run: silive evaluate-chain "Si-O-Si-O-Fe-O-Si" --environment hydrothermal

      - name: Run quick chain search smoke test
        run: |
          silive search-chain \
            --seed "Si-O-Si-O-Fe-O-Si" \
            --rounds 20 \
            --top 5 \
            --random-seed 42 \
            --environment hydrothermal \
            --output outputs/chain_search.csv

      - name: Run quick chain simulation smoke test
        run: |
          silive chain-simulate "Si-O-Si-O-Fe-O-Si" \
            --environment hydrothermal \
            --generations 5 \
            --runs 2 \
            --seed 42

      - name: Run quick chain report smoke test
        run: |
          silive chain-report "Si-O-Si-O-Fe-O-Si" \
            --environment hydrothermal \
            --generations 5 \
            --runs 2 \
            --seed 42 \
            --output-dir outputs/chain_report

      - name: Run quick environment sweep smoke test
        run: |
          silive environment-sweep "Si-O-Si-O-Fe-O-Si" \
            --generations 5 \
            --runs 2 \
            --seed 42 \
            --output-dir outputs/env_sweep

      - name: Run quick niche search smoke test
        run: |
          silive niche-search \
            --seed "Si-O-Si-O-Fe-O-Si" \
            --rounds 2 \
            --top 3 \
            --generations 3 \
            --runs 1 \
            --random-seed 42 \
            --output-dir outputs/niche_search

      - name: Run quick visual lab smoke test
        run: |
          silive lab \
            --mutation-steps 3 \
            --shell-steps 3 \
            --runs 2 \
            --generations 5 \
            --seed 42 \
            --output-dir outputs/lab

      - name: Run quick repair study smoke test
        run: |
          silive repair-study \
            --mutation-steps 3 \
            --shell-steps 3 \
            --runs 2 \
            --generations 5 \
            --seed 42 \
            --output-dir outputs/repair_study

      - name: Upload lab outputs
        uses: actions/upload-artifact@v4
        with:
          name: silive-outputs-py${{ matrix.python-version }}
          path: outputs/
          if-no-files-found: error
