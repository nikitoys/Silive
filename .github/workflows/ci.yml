name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test and smoke-run lab
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run symbolic chemistry smoke test
        run: silive evaluate-chain "Si-O-Si-O-Fe-O-Si"

      - name: Run environment chemistry smoke test
        run: silive evaluate-chain "Si-O-Si-O-Fe-O-Si" --environment hydrothermal

      - name: Run quick chain search smoke test
        run: |
          silive search-chain \
            --seed "Si-O-Si-O-Fe-O-Si" \
            --rounds 20 \
            --top 5 \
            --random-seed 42 \
            --environment hydrothermal \
            --output outputs/chain_search.csv

      - name: Run quick chain simulation smoke test
        run: |
          silive chain-simulate "Si-O-Si-O-Fe-O-Si" \
            --environment hydrothermal \
            --generations 5 \
            --runs 2 \
            --seed 42

      - name: Run quick visual lab smoke test
        run: |
          silive lab \
            --mutation-steps 3 \
            --shell-steps 3 \
            --runs 2 \
            --generations 5 \
            --seed 42 \
            --output-dir outputs/lab

      - name: Run quick repair study smoke test
        run: |
          silive repair-study \
            --mutation-steps 3 \
            --shell-steps 3 \
            --runs 2 \
            --generations 5 \
            --seed 42 \
            --output-dir outputs/repair_study

      - name: Upload lab outputs
        uses: actions/upload-artifact@v4
        with:
          name: silive-outputs-py${{ matrix.python-version }}
          path: outputs/
          if-no-files-found: error
