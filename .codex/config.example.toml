# Example Codex MCP config for Silive.
# Copy to .codex/config.toml locally if needed.
# Do not put secrets, tokens, private paths, or machine-specific credentials here.

[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--context", "codex"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.browser]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.documents]
command = "uvx"
args = ["awslabs.document-loader-mcp-server@latest"]

[mcp_servers.documents.env]
FASTMCP_LOG_LEVEL = "ERROR"

